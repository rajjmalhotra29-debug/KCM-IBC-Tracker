name: Build & deploy KCM IBC Finder

on:
  schedule:
    - cron: "30 1 * * *"      # 07:00 IST daily — scrape IBBI, match, publish
  workflow_dispatch: {}         # manual "Run workflow" button
  push:
    branches: [main]
    paths:
      - "data/**"               # rebuild when the client book / deals change
      - "backend/**"
      - ".github/workflows/**"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    env:
      ACCESS_MODE: open
      BRAND: kcm
      SOURCE_URL: https://ibbi.gov.in/public-announcement
      SOURCE_ADAPTER: ibbi
      # Change this to your preferred leads inbox (or set a repo variable).
      CONTACT_EMAIL: Suril.mehta@kcmehta.com
      # AI turns on automatically once this secret is set (Settings → Secrets).
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Build static site (scrape + match + AI)
        working-directory: backend
        run: python -m app.build_site

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deploy
        uses: actions/deploy-pages@v4
