name: Refresh IBBI feed (daily) → Vercel

# Scrapes IBBI, rebuilds the public feed, and commits it to public/.
# Vercel is connected to this repo and auto-deploys on every push, so each
# refresh goes live automatically. This is the "GitHub daily refresh + Vercel
# hosting" setup.

on:
  schedule:
    - cron: "30 1 * * *"        # 07:00 IST daily
  workflow_dispatch: {}          # manual "Run workflow" button
  push:
    branches: [main]
    paths:                       # rebuild when code/data change (NOT public/, avoids a loop)
      - "backend/**"
      - "data/**"
      - ".github/workflows/**"

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      ACCESS_MODE: open
      BRAND: kcm
      SOURCE_URL: https://ibbi.gov.in/public-announcement
      SOURCE_ADAPTER: ibbi
      CONTACT_EMAIL: mna.advisory@kcmehta.com
      ENGAGE_KEY: ${{ secrets.ENGAGE_KEY }}               # Web3Forms key (optional)
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }} # AI ranker (optional)
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Build the public feed
        working-directory: backend
        run: python -m app.build_site

      - name: Publish to public/
        run: |
          rm -rf public && mkdir -p public
          cp -r site/* public/

      - name: Commit refreshed feed (Vercel auto-deploys)
        run: |
          git config user.name "kcm-ibc-bot"
          git config user.email "actions@users.noreply.github.com"
          git add public
          git diff --cached --quiet || git commit -m "Daily IBBI refresh [skip ci]"
          git push
